/* ============== MUSIC: Web Audio API generated ambient track (no external dependency) ============== */
const Music = (() => {
  let ctx = null;
  let masterGain = null;
  let nodes = [];
  let playing = false;
  let started = false;

  function createAmbient() {
    if (started) return;
    started = true;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(ctx.destination);

    // Warm pad: layered sine + triangle oscillators in pleasant intervals (C major pentatonic)
    // Frequencies: C3, E3, G3, C4, D4, G4 — soft kitchen lounge feel
    const freqs = [130.81, 164.81, 196.00, 261.63, 293.66, 392.00];
    freqs.forEach((f, i) => {
      const osc = ctx.createOscillator();
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      osc.frequency.value = f;

      // Subtle detune wobble for organic feel
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.1 + i * 0.07;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 1.5;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.detune);

      const g = ctx.createGain();
      g.gain.value = 0.04 / (i + 1);

      // Gentle volume pulse
      const ampLfo = ctx.createOscillator();
      ampLfo.frequency.value = 0.05 + i * 0.03;
      const ampLfoGain = ctx.createGain();
      ampLfoGain.gain.value = 0.015;
      ampLfo.connect(ampLfoGain);
      ampLfoGain.connect(g.gain);

      // Lowpass for warmth
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1200;
      filter.Q.value = 0.7;

      osc.connect(filter);
      filter.connect(g);
      g.connect(masterGain);

      osc.start();
      lfo.start();
      ampLfo.start();
      nodes.push(osc, lfo, ampLfo);
    });
  }

  function play() {
    createAmbient();
    if (ctx.state === 'suspended') ctx.resume();
    masterGain.gain.cancelScheduledValues(ctx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 1.5);
    playing = true;
    setStatus('Ambient music on');
  }

  function pause() {
    if (!ctx) return;
    masterGain.gain.cancelScheduledValues(ctx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
    playing = false;
    setStatus('Music off');
  }

  function toggle() {
    if (playing) pause(); else play();
    return playing;
  }

  function setStatus(t) {
    const s = document.getElementById('musicStatus');
    if (s) { s.textContent = t; setTimeout(() => { if (s.textContent === t) s.textContent = ''; }, 2500); }
  }

  return { toggle, isPlaying: () => playing };
})();

const QUESTIONS = [
  { key: "occasion", title: "What's the occasion?", subtitle: "Set the mood for your meal", opts: [
    { v: "party", label: "Party", emoji: "🎉" },

/* ============== APP STATE & RENDER ============== */
const state = {
  step: 0,
  answers: { occasion: null, culture: null, ingredients: [], time: null, gadgets: [] },
  view: "questions",
  currentRecipe: null,
  favorites: JSON.parse(localStorage.getItem("cc_favs") || "[]")
};

const card = document.getElementById("card");

function renderStep() {
  const q = QUESTIONS[state.step];
  const dots = QUESTIONS.map((_, i) => `<div class="dot ${i === state.step ? 'active' : i < state.step ? 'done' : ''}"></div>`).join('');
  const current = state.answers[q.key];
  const opts = q.opts.map(o => {
    const sel = q.multi ? current.includes(o.v) : current === o.v;
    return `<button class="opt ${sel ? 'selected' : ''}" data-v="${o.v}"><span class="emoji">${o.emoji}</span>${o.label}</button>`;
  }).join('');
  const valid = q.multi ? current.length > 0 : current !== null;
  card.innerHTML = `
    <div class="step-indicator">${dots}</div>
    <h1>${q.title}</h1>
    <p class="subtitle">${q.subtitle}</p>
    <div class="options">${opts}</div>
    <div class="actions">
      ${state.step > 0 ? '<button class="btn btn-ghost" id="back">← Back</button>' : ''}
      <button class="btn btn-primary" id="next" ${valid ? '' : 'disabled'}>${state.step === QUESTIONS.length - 1 ? 'Find My Recipe ✨' : 'Next →'}</button>
    </div>
  `;
  card.querySelectorAll('.opt').forEach(b => b.onclick = () => {
    let v = b.dataset.v;
    if (!isNaN(v) && q.opts[0].v !== "any") v = Number(v);
    if (q.multi) {
      const arr = state.answers[q.key];
      const idx = arr.indexOf(v);
      if (idx >= 0) arr.splice(idx, 1); else arr.push(v);
    } else {
      state.answers[q.key] = v;
    }
    renderStep();
  });
  const next = card.querySelector('#next');
  if (next) next.onclick = () => {
    if (state.step === QUESTIONS.length - 1) { suggestRecipe(); } else { state.step++; renderStep(); }
  };
  const back = card.querySelector('#back');
  if (back) back.onclick = () => { state.step--; renderStep(); };
}

function suggestRecipe() {
  const a = state.answers;
  const scored = RECIPES.map(r => {
    let s = 0;
    if (r.occasions.includes(a.occasion)) s += 5;
    if (r.culture === a.culture || r.culture === 'any' || a.culture === 'any') s += 4;
    s += r.ing.filter(i => a.ingredients.includes(i)).length * 2;
    if (r.time <= a.time) s += 3;
    if (r.gadgets.length === 0 || r.gadgets.some(g => a.gadgets.includes(g))) s += 3;
    return { r, s };
  }).sort((x, y) => y.s - x.s);
  const top = scored.slice(0, 3);
  state.currentRecipe = top[Math.floor(Math.random() * top.length)].r;
  state.view = "recipe";
  renderRecipe();
}

function renderRecipe() {
  const r = state.currentRecipe;
  const isFav = state.favorites.some(f => f.name === r.name);
  card.innerHTML = `
    <h1 class="recipe-title">${r.name}</h1>
    <div class="recipe-meta">
      <span>⏱️ ${r.time} min</span>
      <span>🌍 ${r.culture}</span>
      <span>🔥 ${r.gadgets.join(', ') || 'no gadgets'}</span>
    </div>
    <div class="section-label">Ingredients</div>
    <div class="ing-list">${r.ing.map(i => `<span class="ing-tag">${i}</span>`).join('')}</div>
    <div class="section-label">Steps</div>
    <ol class="steps">${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
    <div class="actions" style="margin-top:16px">
      <button class="btn btn-ghost" id="another">🎲 Try Another</button>
      <button class="btn btn-primary" id="save">${isFav ? '♥ Saved' : '♡ Save'}</button>
    </div>
  `;
  card.querySelector('#another').onclick = suggestRecipe;
  card.querySelector('#save').onclick = () => {
    if (!isFav) {
      state.favorites.push(r);
      localStorage.setItem("cc_favs", JSON.stringify(state.favorites));
    }
    renderRecipe();
  };
}

function renderFavorites() {
  const items = state.favorites.length === 0
    ? '<div class="empty">No favorites yet. Cook something delicious! 🍳</div>'
    : `<div class="fav-list">${state.favorites.map((f, i) => `
        <div class="fav-item">
          <div>
            <div class="name">${f.name}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${f.time} min · ${f.culture}</div>
          </div>
          <div>
            <button data-view="${i}" title="View">👁️</button>
            <button data-rm="${i}" title="Remove">✕</button>
          </div>
        </div>`).join('')}</div>`;
  card.innerHTML = `
    <h1>Your Favorites</h1>
    <p class="subtitle">${state.favorites.length} saved recipe${state.favorites.length === 1 ? '' : 's'}</p>
    ${items}
    <div class="actions" style="margin-top:16px">
      <button class="btn btn-primary" id="closeFav">Back to cooking</button>
    </div>
  `;
  card.querySelectorAll('[data-rm]').forEach(b => b.onclick = () => {
    state.favorites.splice(Number(b.dataset.rm), 1);
    localStorage.setItem("cc_favs", JSON.stringify(state.favorites));
    renderFavorites();
  });
  card.querySelectorAll('[data-view]').forEach(b => b.onclick = () => {
    state.currentRecipe = state.favorites[Number(b.dataset.view)];
    state.view = "recipe";
    renderRecipe();
  });
  card.querySelector('#closeFav').onclick = () => {
    state.view = "questions";
    renderStep();
  };
}

/* ============== CONTROLS ============== */
document.getElementById('musicBtn').onclick = (e) => {
  const playing = Music.toggle();
  e.currentTarget.classList.toggle('active', playing);
};
document.getElementById('favBtn').onclick = () => {
  state.view = "favorites";
  renderFavorites();
};
document.getElementById('restartBtn').onclick = () => {
  state.step = 0;
  state.answers = { occasion: null, culture: null, ingredients: [], time: null, gadgets: [] };
  state.view = "questions";
  renderStep();
};

renderStep();

/* Show a small hint about music */
setTimeout(() => {
  const s = document.getElementById('musicStatus');
  if (s && !Music.isPlaying()) s.textContent = 'Tap ♪ for ambient music';
  setTimeout(() => { if (s.textContent === 'Tap ♪ for ambient music') s.textContent = ''; }, 4000);
}, 1500);
</script>
