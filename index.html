<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Culinary Cracks — What Should I Cook?</title>
<meta name="description" content="Tell us your occasion, ingredients, time and gadgets — get a perfect recipe in seconds." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#1a0f08;
    --bg-2:#2a1810;
    --bg-3:#3d1f0e;
    --accent:#ff8c42;
    --accent-2:#ffb347;
    --accent-glow:rgba(255,140,66,.4);
    --cream:#fff4e6;
    --muted:rgba(255,244,230,.65);
    --card:rgba(255,244,230,.06);
    --card-border:rgba(255,244,230,.12);
    --shadow:0 20px 60px -10px rgba(0,0,0,.5);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--cream);
    background:
      radial-gradient(ellipse at top left, rgba(255,140,66,.15), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(255,179,71,.1), transparent 50%),
      linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    -webkit-font-smoothing:antialiased;
    user-select:none;
  }
  #app{
    height:100vh;height:100dvh;
    display:flex;flex-direction:column;
    padding:16px;
    max-width:560px;margin:0 auto;
    position:relative;
  }
  /* Header */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:4px 4px 12px;flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:8px}
  .logo{
    width:34px;height:34px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:grid;place-items:center;font-size:18px;
    box-shadow:0 4px 14px var(--accent-glow);
  }
  .brand h1{
    font-family:'Fraunces',serif;font-weight:900;
    font-size:18px;letter-spacing:-.5px;
  }
  .brand h1 span{color:var(--accent)}
  .controls{display:flex;gap:8px}
  .icon-btn{
    width:36px;height:36px;border-radius:10px;
    border:1px solid var(--card-border);background:var(--card);
    color:var(--cream);cursor:pointer;
    display:grid;place-items:center;font-size:15px;
    transition:.2s;
  }
  .icon-btn:hover{background:rgba(255,244,230,.12);transform:translateY(-1px)}
  .icon-btn.active{background:var(--accent);color:var(--bg-1);border-color:var(--accent)}
  /* Main card */
  .stage{
    flex:1;
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:24px;
    padding:20px;
    backdrop-filter:blur(20px);
    box-shadow:var(--shadow);
    display:flex;flex-direction:column;
    overflow:hidden;
    position:relative;
    min-height:0;
  }
  /* Progress */
  .progress-wrap{
    display:flex;gap:4px;margin-bottom:16px;flex-shrink:0;
  }
  .progress-dot{
    flex:1;height:4px;border-radius:2px;
    background:rgba(255,244,230,.1);transition:.4s;
  }
  .progress-dot.done{background:var(--accent)}
  .progress-dot.current{background:var(--accent-2);box-shadow:0 0 8px var(--accent-glow)}
  /* Step */
  .step{
    flex:1;display:flex;flex-direction:column;
    animation:fadeIn .4s ease;
    overflow:hidden;min-height:0;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .step-label{
    font-size:11px;text-transform:uppercase;letter-spacing:1.5px;
    color:var(--accent);font-weight:600;margin-bottom:6px;
  }
  .step-title{
    font-family:'Fraunces',serif;font-weight:700;
    font-size:22px;line-height:1.2;margin-bottom:14px;
  }
  .options{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
    flex:1;overflow-y:auto;align-content:start;
    padding-right:2px;
  }
  .options::-webkit-scrollbar{width:4px}
  .options::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:2px}
  .opt{
    background:rgba(255,244,230,.04);
    border:1.5px solid var(--card-border);
    border-radius:14px;
    padding:12px 10px;
    cursor:pointer;
    text-align:center;
    transition:.2s;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .opt:hover{border-color:var(--accent);background:rgba(255,140,66,.08);transform:translateY(-2px)}
  .opt.selected{
    border-color:var(--accent);background:rgba(255,140,66,.15);
    box-shadow:0 0 0 2px var(--accent-glow);
  }
  .opt-emoji{font-size:22px;line-height:1}
  .opt-label{font-size:12px;font-weight:600;line-height:1.2}
  /* Multi-select tag */
  .opt.multi.selected::after{
    content:'✓';position:absolute;
  }
  .opt{position:relative}
  .opt.multi.selected .check{
    position:absolute;top:4px;right:4px;
    background:var(--accent);color:var(--bg-1);
    width:16px;height:16px;border-radius:50%;
    display:grid;place-items:center;font-size:10px;font-weight:900;
  }
  /* Nav */
  .nav{
    display:flex;gap:8px;margin-top:12px;flex-shrink:0;
  }
  .btn{
    flex:1;padding:12px;border-radius:12px;
    font-weight:700;font-size:14px;cursor:pointer;
    border:none;transition:.2s;font-family:inherit;
  }
  .btn-secondary{
    background:transparent;color:var(--cream);
    border:1.5px solid var(--card-border);
  }
  .btn-secondary:hover{background:var(--card)}
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    color:var(--bg-1);
    box-shadow:0 6px 20px var(--accent-glow);
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 24px var(--accent-glow)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
  /* Result */
  .recipe{
    flex:1;overflow-y:auto;padding-right:4px;
  }
  .recipe::-webkit-scrollbar{width:4px}
  .recipe::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
  .recipe-hero{
    display:flex;align-items:center;gap:12px;margin-bottom:14px;
  }
  .recipe-emoji{
    font-size:42px;width:64px;height:64px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    border-radius:16px;display:grid;place-items:center;
    box-shadow:0 8px 20px var(--accent-glow);
    flex-shrink:0;
  }
  .recipe-title{
    font-family:'Fraunces',serif;font-weight:700;
    font-size:22px;line-height:1.15;
  }
  .recipe-meta{
    display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;
  }
  .chip{
    background:rgba(255,140,66,.15);color:var(--accent-2);
    padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600;
  }
  .section{margin-top:14px}
  .section h3{
    font-size:13px;text-transform:uppercase;letter-spacing:1px;
    color:var(--accent);margin-bottom:8px;font-weight:700;
  }
  .ing-list{display:grid;gap:4px}
  .ing{
    background:rgba(255,244,230,.04);
    padding:8px 10px;border-radius:8px;font-size:13px;
    display:flex;align-items:center;gap:8px;
  }
  .ing::before{content:'•';color:var(--accent);font-weight:900}
  .steps{display:grid;gap:8px;counter-reset:step}
  .stepitem{
    background:rgba(255,244,230,.04);
    padding:10px 10px 10px 36px;border-radius:10px;
    font-size:13px;line-height:1.45;position:relative;
    counter-increment:step;
  }
  .stepitem::before{
    content:counter(step);
    position:absolute;left:8px;top:8px;
    width:22px;height:22px;border-radius:50%;
    background:var(--accent);color:var(--bg-1);
    display:grid;place-items:center;font-weight:900;font-size:11px;
  }
  /* Toast */
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);
    background:var(--cream);color:var(--bg-1);
    padding:10px 18px;border-radius:12px;font-weight:600;font-size:13px;
    box-shadow:var(--shadow);transition:.3s;z-index:100;
    pointer-events:none;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  /* Favorites overlay */
  .fav-panel{
    position:absolute;inset:0;
    background:linear-gradient(135deg,var(--bg-2),var(--bg-3));
    border-radius:24px;padding:20px;
    transform:translateY(100%);transition:.4s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;z-index:50;
  }
  .fav-panel.open{transform:translateY(0)}
  .fav-header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:14px;flex-shrink:0;
  }
  .fav-header h2{font-family:'Fraunces',serif;font-size:20px}
  .fav-list{flex:1;overflow-y:auto;display:grid;gap:8px;padding-right:4px}
  .fav-list::-webkit-scrollbar{width:4px}
  .fav-list::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
  .fav-item{
    background:var(--card);border:1px solid var(--card-border);
    border-radius:12px;padding:10px 12px;
    display:flex;align-items:center;gap:10px;cursor:pointer;
    transition:.2s;
  }
  .fav-item:hover{border-color:var(--accent)}
  .fav-emoji{font-size:24px;flex-shrink:0}
  .fav-info{flex:1;min-width:0}
  .fav-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fav-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .fav-del{
    background:transparent;border:none;color:var(--muted);
    cursor:pointer;padding:6px;font-size:14px;
  }
  .fav-del:hover{color:#ff6b6b}
  .fav-empty{
    text-align:center;padding:40px 20px;color:var(--muted);
  }
  .fav-empty-emoji{font-size:48px;margin-bottom:10px}
  /* Music indicator */
  .music-pulse{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    animation:pulse 1s infinite;
  }
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  /* Heart btn on result */
  .heart-btn{
    background:rgba(255,244,230,.08);border:1px solid var(--card-border);
    color:var(--cream);padding:10px 14px;border-radius:12px;
    font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;
    transition:.2s;
  }
  .heart-btn:hover{background:rgba(255,107,107,.15);border-color:#ff6b6b}
  .heart-btn.saved{background:#ff6b6b;border-color:#ff6b6b;color:white}
  @media (max-width:380px){
    .step-title{font-size:19px}
    .options{grid-template-columns:1fr 1fr;gap:6px}
    .opt{padding:10px 6px}
    .opt-emoji{font-size:20px}
    .opt-label{font-size:11px}
  }
</style>
</head>

</div>

/* ============== STATE ============== */
const state = {
  step:0,
  answers:{occasion:null,culture:null,ingredients:[],time:null,gadgets:[]},
  result:null,
  music:false,
};

/* ============== UTIL ============== */
const $ = id => document.getElementById(id);
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}
function escape(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

/* ============== RENDER ============== */
function renderProgress(){
  const total = QUESTIONS.length + 1; // + result
  $('progress').innerHTML = Array.from({length:total},(_,i)=>{
    const cls = i < state.step ? 'done' : (i===state.step ? 'current' : '');
    return `<div class="progress-dot ${cls}"></div>`;
  }).join('');
}

function renderStep(){
  renderProgress();
  if(state.step < QUESTIONS.length){
    const q = QUESTIONS[state.step];
    const ans = state.answers[q.key];
    const isMulti = q.multi;
    $('content').innerHTML = `
      <div class="step">
        <div class="step-label">${q.label} of ${QUESTIONS.length}${isMulti?' • pick any':''}</div>
        <div class="step-title">${q.title}</div>
        <div class="options">
          ${q.options.map(o=>{
            const sel = isMulti ? ans.includes(o.v) : ans===o.v;
            return `<div class="opt ${isMulti?'multi':''} ${sel?'selected':''}" data-v="${o.v}">
              ${sel && isMulti ? '<span class="check">✓</span>':''}
              <div class="opt-emoji">${o.e}</div>
              <div class="opt-label">${o.l}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="nav">
          ${state.step>0?'<button class="btn btn-secondary" id="backBtn">← Back</button>':''}
          <button class="btn btn-primary" id="nextBtn" ${canProceed()?'':'disabled'}>
            ${state.step===QUESTIONS.length-1?'Find My Recipe ✨':'Next →'}
          </button>
        </div>
      </div>`;
    bindOptions(q);
  } else {
    renderResult();
  }
}

function canProceed(){
  const q = QUESTIONS[state.step];
  const a = state.answers[q.key];
  return q.multi ? a.length>0 : !!a;
}

function bindOptions(q){
  document.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{
      const v = el.dataset.v;
      if(q.multi){
        const arr = state.answers[q.key];
        const i = arr.indexOf(v);
        if(i>-1) arr.splice(i,1); else arr.push(v);
      } else {
        state.answers[q.key] = v;
      }
      renderStep();
    });
  });
  const back = $('backBtn'); if(back) back.onclick = ()=>{state.step--;renderStep()};
  $('nextBtn').onclick = ()=>{
    if(!canProceed()) return;
    state.step++;
    if(state.step===QUESTIONS.length) state.result = pickRecipe();
    renderStep();
  };
}

/* ============== MATCHING ============== */
function pickRecipe(){
  const a = state.answers;
  const timeNum = parseInt(a.time);
  const scored = RECIPES.map(r=>{
    let s = 0;
    if(r.occasions.includes(a.occasion)) s += 5;
    if(r.culture===a.culture || r.culture==='any' || a.culture==='any') s += 4;
    if(r.time <= timeNum) s += 3; else s -= 2;
    const ingMatch = r.ing.filter(i=>a.ingredients.includes(i)).length;
    s += ingMatch * 2;
    if(r.ing.length===0) s += 1; // bonus for no-ingredient recipes
    const gadgetOk = r.gadgets.some(g=>a.gadgets.includes(g));
    if(gadgetOk) s += 3; else s -= 3;
    return {r,s};
  }).sort((x,y)=>y.s-x.s);
  // pick from top 3 with slight randomness
  const top = scored.slice(0,3);
  return top[Math.floor(Math.random()*top.length)].r;
}

/* ============== RESULT ============== */
function renderResult(){
  const r = state.result;
  const favs = getFavs();
  const isSaved = favs.some(f=>f.id===r.id);
  $('content').innerHTML = `
    <div class="step">
      <div class="step-label">Your perfect match ✨</div>
      <div class="recipe">
        <div class="recipe-hero">
          <div class="recipe-emoji">${r.emoji}</div>
          <div>
            <div class="recipe-title">${escape(r.name)}</div>
            <div class="recipe-meta">
              <span class="chip">⏱ ${r.time} min</span>
              <span class="chip">${r.culture}</span>
            </div>
          </div>
        </div>
        <div class="section">
          <h3>Ingredients</h3>
          <div class="ing-list">
            ${r.ingredients.map(i=>`<div class="ing">${escape(i)}</div>`).join('')}
          </div>
        </div>
        <div class="section">
          <h3>Easy Steps</h3>
          <div class="steps">
            ${r.steps.map(s=>`<div class="stepitem">${escape(s)}</div>`).join('')}
          </div>
        </div>
      </div>
      <div class="nav">
        <button class="btn btn-secondary" id="restartBtn">↺ New Search</button>
        <button class="btn btn-secondary" id="anotherBtn">🎲 Another</button>
        <button class="heart-btn ${isSaved?'saved':''}" id="saveBtn">
          ${isSaved?'♥ Saved':'♡ Save'}
        </button>
      </div>
    </div>`;
  $('restartBtn').onclick = ()=>{
    state.step = 0;
    state.answers = {occasion:null,culture:null,ingredients:[],time:null,gadgets:[]};
    renderStep();
  };
  $('anotherBtn').onclick = ()=>{
    state.result = pickRecipe();
    renderResult();
  };
  $('saveBtn').onclick = ()=>{
    toggleFav(r);
    renderResult();
  };
}

/* ============== FAVORITES ============== */
const FAV_KEY = 'culinary_cracks_favs';
function getFavs(){
  try{ return JSON.parse(localStorage.getItem(FAV_KEY)||'[]'); }catch{ return []; }
}
function setFavs(list){
  localStorage.setItem(FAV_KEY,JSON.stringify(list));
}
function toggleFav(r){
  const favs = getFavs();
  const i = favs.findIndex(f=>f.id===r.id);
  if(i>-1){ favs.splice(i,1); toast('Removed from favorites'); }
  else { favs.unshift(r); toast('Saved to favorites ♥'); }
  setFavs(favs);
}
function renderFavs(){
  const favs = getFavs();
  if(favs.length===0){
    $('favList').innerHTML = `
      <div class="fav-empty">
        <div class="fav-empty-emoji">🍽️</div>
        <div>No favorites yet.<br>Save recipes you love!</div>
      </div>`;
    return;
  }
  $('favList').innerHTML = favs.map(f=>`
    <div class="fav-item" data-id="${f.id}">
      <div class="fav-emoji">${f.emoji}</div>
      <div class="fav-info">
        <div class="fav-name">${escape(f.name)}</div>
        <div class="fav-meta">${f.culture} • ${f.time} min</div>
      </div>
      <button class="fav-del" data-del="${f.id}">🗑</button>
    </div>`).join('');
  document.querySelectorAll('.fav-item').forEach(el=>{
    el.addEventListener('click',(e)=>{
      if(e.target.dataset.del){
        const id = e.target.dataset.del;
        setFavs(getFavs().filter(f=>f.id!==id));
        renderFavs();
        return;
      }
      const id = el.dataset.id;
      const r = getFavs().find(f=>f.id===id);
      if(r){
        state.result = r;
        state.step = QUESTIONS.length;
        $('favPanel').classList.remove('open');
        renderStep();
      }
    });
  });
}

/* ============== MUSIC ============== */
const audio = $('bgMusic');
audio.volume = 0.3;
$('musicBtn').onclick = ()=>{
  state.music = !state.music;
  if(state.music){
    audio.play().then(()=>{
      $('musicBtn').classList.add('active');
      $('musicBtn').innerHTML = '<span class="music-pulse"></span>';
      toast('Music on 🎵');
    }).catch(()=>{
      toast('Music could not load');
      state.music = false;
    });
  } else {
    audio.pause();
    $('musicBtn').classList.remove('active');
    $('musicBtn').innerHTML = '🎵';
    toast('Music off');
  }
};

/* ============== FAV PANEL ============== */
$('favBtn').onclick = ()=>{
  renderFavs();
  $('favPanel').classList.add('open');
};
$('closeFav').onclick = ()=>$('favPanel').classList.remove('open');

/* ============== INIT ============== */
renderStep();
</script>
